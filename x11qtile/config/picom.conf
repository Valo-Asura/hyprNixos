#################################
#       General Settings        #
#################################
backend = "glx";
vsync = true;
use-damage = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

# GLX backend performance tweaks
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-copysubbuffermesa = false;

#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-exclude = [
  "class_g = 'Bar'",
  "class_g = 'qtile'",
  "name = 'Notification'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Fading              #
#################################
# Fast and responsive fading transitions
fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 5;

#################################
#           Animations          #
#################################
animations = true;
animation-stiffness = 300.0;
animation-dampening = 25.0;
animation-clamping = true;
animation-mass = 1.0;
animation-for-open-window = "zoom";
animation-for-menu-window = "slide-down";
animation-for-transient-window = "zoom";
animation-for-workspace-switch-in = "zoom";
animation-for-workspace-switch-out = "zoom";

#################################
#         Corner Radius         #
#################################
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#        Background Blur        #
#################################
# Premium dual-kawase blur powered by the GPU
blur-background = true;
blur-method = "dual_kawase";
blur-strength = 4;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'slop'"
];

#################################
#             Rules             #
#################################
rules: (
  {
    match = "window_type = 'tooltip' || window_type = 'menu' || window_type = 'dropdown_menu' || window_type = 'popup_menu'";
    shadow = false;
    blur-background = false;
    corner-radius = 0;
    opacity = 0.95;
  },
  {
    match = "fullscreen || window_type = 'dock'";
    corner-radius = 0;
    blur-background = false;
  },
  {
    match = "class_g = 'Bar' || class_g = 'Polybar' || class_g = 'qtile'";
    opacity = 0.9;
  },
  {
    match = "class_g = 'slop'";
    opacity = 1.0;
    shadow = false;
    fade = false;
    blur-background = false;
  }
);
